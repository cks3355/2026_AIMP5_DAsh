<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <style>
      .bg{fill:#f6f7f8}
      .title{font:700 30px Arial,Helvetica,sans-serif;fill:#17202a}
      .small{font:14px Arial,Helvetica,sans-serif;fill:#56616d}
      .head{fill:#eef7f4;stroke:#337566;stroke-width:2;rx:8}
      .lifeline{stroke:#b8c1ca;stroke-width:2;stroke-dasharray:7 7}
      .msg{stroke:#52606d;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
      .return{stroke:#7b8792;stroke-width:2;fill:none;stroke-dasharray:8 6;marker-end:url(#arrow)}
      .label{font:600 16px Arial,Helvetica,sans-serif;fill:#17202a}
      .actor{font:700 17px Arial,Helvetica,sans-serif;fill:#17202a}
      .note{fill:#ffffff;stroke:#cfd6dd;stroke-width:2;rx:8}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#52606d"/>
    </marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <text x="60" y="62" class="title">05.11_pimono_v9.py Architecture Sequence</text>
  <text x="60" y="92" class="small">Request flow from user input through Python DAsh graph and the long-running Node Pi server.</text>

  <rect x="70" y="135" width="160" height="58" class="head"/>
  <text x="117" y="170" class="actor">User</text>
  <rect x="300" y="135" width="210" height="58" class="head"/>
  <text x="336" y="170" class="actor">05.11 Python</text>
  <rect x="580" y="135" width="230" height="58" class="head"/>
  <text x="615" y="170" class="actor">PiMonoSuperAgent</text>
  <rect x="875" y="135" width="180" height="58" class="head"/>
  <text x="919" y="170" class="actor">DashGraph</text>
  <rect x="1115" y="135" width="190" height="58" class="head"/>
  <text x="1155" y="170" class="actor">Node Server</text>
  <rect x="1375" y="135" width="150" height="58" class="head"/>
  <text x="1410" y="170" class="actor">Pi Agent</text>

  <line x1="150" y1="193" x2="150" y2="820" class="lifeline"/>
  <line x1="405" y1="193" x2="405" y2="820" class="lifeline"/>
  <line x1="695" y1="193" x2="695" y2="820" class="lifeline"/>
  <line x1="965" y1="193" x2="965" y2="820" class="lifeline"/>
  <line x1="1210" y1="193" x2="1210" y2="820" class="lifeline"/>
  <line x1="1450" y1="193" x2="1450" y2="820" class="lifeline"/>

  <path d="M150 245 L405 245" class="msg"/>
  <text x="205" y="235" class="label">prompt input</text>

  <path d="M405 310 L695 310" class="msg"/>
  <text x="465" y="300" class="label">run(prompt, session, memory)</text>

  <path d="M695 375 L965 375" class="msg"/>
  <text x="735" y="365" class="label">_run_python_graph()</text>

  <path d="M965 440 L965 505" class="msg"/>
  <text x="985" y="455" class="label">RouterSkill.classify()</text>
  <text x="985" y="482" class="label">select / recommend / validate / change</text>

  <path d="M965 545 L695 545" class="return"/>
  <text x="745" y="535" class="label">AgentTurnState</text>

  <path d="M695 610 L1210 610" class="msg"/>
  <text x="800" y="600" class="label">POST /run with precomputed state</text>

  <path d="M1210 670 L1450 670" class="msg"/>
  <text x="1250" y="660" class="label">new Agent(), prompt()</text>

  <path d="M1450 725 L1450 775" class="msg"/>
  <text x="1165" y="745" class="label">run_dash_graph AgentTool returns backendState</text>

  <path d="M1450 805 L1210 805" class="return"/>
  <text x="1275" y="795" class="label">Pi lifecycle events</text>

  <path d="M1210 840 L695 840" class="return"/>
  <text x="855" y="830" class="label">events + state JSON</text>

  <rect x="555" y="635" width="275" height="78" class="note"/>
  <text x="580" y="665" class="label">Fallback</text>
  <text x="580" y="690" class="small">If /health or /run fails, Python graph result is used.</text>
</svg>
