<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1100" viewBox="0 0 1600 1100">
  <defs>
    <style>
      .bg{fill:#f6f7f8}
      .panel{fill:#ffffff;stroke:#cfd6dd;stroke-width:2;rx:12}
      .title{font:700 30px Arial,Helvetica,sans-serif;fill:#17202a}
      .section{font:700 22px Arial,Helvetica,sans-serif;fill:#24313d}
      .box{fill:#ffffff;stroke:#337566;stroke-width:2;rx:8}
      .box2{fill:#eef7f4;stroke:#337566;stroke-width:2;rx:8}
      .node{font:600 17px Arial,Helvetica,sans-serif;fill:#17202a}
      .small{font:14px Arial,Helvetica,sans-serif;fill:#56616d}
      .arrow{stroke:#52606d;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
      .dash{stroke:#7b8792;stroke-width:2;fill:none;stroke-dasharray:7 6;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#52606d"/>
    </marker>
  </defs>
  <rect class="bg" width="1600" height="1100"/>
  <text x="60" y="62" class="title">05.11_pimono_v9.py Architecture Overview</text>
  <text x="60" y="92" class="small">Python DAsh graph handles domain logic. A long-running Node Pi server wraps results with real Pi Agent events.</text>

  <rect x="50" y="125" width="260" height="230" class="panel"/>
  <text x="75" y="165" class="section">Entry</text>
  <rect x="80" y="195" width="200" height="56" class="box"/>
  <text x="105" y="228" class="node">Streamlit UI</text>
  <text x="105" y="247" class="small">render_app()</text>
  <rect x="80" y="275" width="200" height="56" class="box"/>
  <text x="105" y="308" class="node">CLI</text>
  <text x="105" y="327" class="small">run_cli()</text>

  <rect x="370" y="125" width="820" height="790" class="panel"/>
  <text x="400" y="165" class="section">Python Runtime</text>
  <rect x="410" y="195" width="220" height="66" class="box2"/>
  <text x="440" y="228" class="node">build_runtime()</text>
  <text x="440" y="248" class="small">config, docs, repos</text>

  <rect x="715" y="195" width="250" height="66" class="box2"/>
  <text x="742" y="228" class="node">PiMonoSuperAgent</text>
  <text x="742" y="248" class="small">run(), memory, events</text>

  <rect x="410" y="315" width="220" height="66" class="box"/>
  <text x="446" y="348" class="node">RouterSkill</text>
  <text x="446" y="368" class="small">intent classification</text>

  <rect x="700" y="300" width="430" height="365" class="panel"/>
  <text x="730" y="340" class="section">DashGraph</text>
  <rect x="740" y="365" width="160" height="52" class="box"/>
  <text x="764" y="397" class="node">select_agent</text>
  <rect x="930" y="365" width="160" height="52" class="box"/>
  <text x="948" y="397" class="node">recommend_agent</text>
  <rect x="740" y="445" width="160" height="52" class="box"/>
  <text x="762" y="477" class="node">validate_agent</text>
  <rect x="930" y="445" width="160" height="52" class="box"/>
  <text x="958" y="477" class="node">change_agent</text>
  <rect x="835" y="545" width="160" height="52" class="box"/>
  <text x="858" y="577" class="node">finalize_agent</text>

  <rect x="410" y="700" width="310" height="175" class="panel"/>
  <text x="440" y="738" class="section">ToolBox</text>
  <text x="440" y="772" class="small">search_similar_terms()</text>
  <text x="440" y="798" class="small">search_answer_documents()</text>
  <text x="440" y="824" class="small">answer_question()</text>
  <text x="440" y="850" class="small">list_standard_words()</text>

  <rect x="790" y="700" width="320" height="175" class="panel"/>
  <text x="820" y="738" class="section">Repositories</text>
  <text x="820" y="772" class="small">TermRepository: Mock / Oracle</text>
  <text x="820" y="798" class="small">VectorRepository: Mock / FAISS</text>
  <text x="820" y="824" class="small">AnswerVectorRepository</text>
  <text x="820" y="850" class="small">ProjectDocuments: agents/prd/trd/skill</text>

  <rect x="1260" y="125" width="290" height="790" class="panel"/>
  <text x="1290" y="165" class="section">Node Pi Server</text>
  <rect x="1295" y="200" width="220" height="70" class="box2"/>
  <text x="1314" y="232" class="node">dash_pimono_server.mjs</text>
  <text x="1314" y="252" class="small">GET /health, POST /run</text>
  <rect x="1295" y="325" width="220" height="70" class="box"/>
  <text x="1353" y="357" class="node">Pi Agent</text>
  <text x="1314" y="377" class="small">@earendil-works/pi-agent-core</text>
  <rect x="1295" y="450" width="220" height="70" class="box"/>
  <text x="1342" y="482" class="node">getModel()</text>
  <text x="1314" y="502" class="small">@earendil-works/pi-ai</text>
  <rect x="1295" y="575" width="220" height="70" class="box"/>
  <text x="1334" y="607" class="node">run_dash_graph</text>
  <text x="1314" y="627" class="small">AgentTool returns state</text>

  <path d="M280 223 C330 223 350 228 410 228" class="arrow"/>
  <path d="M630 228 L715 228" class="arrow"/>
  <path d="M840 261 L840 300" class="arrow"/>
  <path d="M715 230 C625 260 560 285 520 315" class="arrow"/>
  <path d="M630 348 C665 348 680 348 700 348" class="arrow"/>
  <path d="M840 665 C790 700 735 728 720 760" class="arrow"/>
  <path d="M720 800 L790 800" class="arrow"/>
  <path d="M965 228 C1110 228 1170 235 1295 235" class="dash"/>
  <path d="M1405 270 L1405 325" class="arrow"/>
  <path d="M1405 395 L1405 450" class="arrow"/>
  <path d="M1405 520 L1405 575" class="arrow"/>
  <path d="M1295 610 C1210 650 1090 650 995 585" class="dash"/>
  <path d="M1295 360 C1215 330 1110 285 965 240" class="dash"/>

  <text x="1070" y="214" class="small">precomputed AgentTurnState</text>
  <text x="1132" y="682" class="small">Pi events + state</text>
</svg>
